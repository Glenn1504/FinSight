# configs/settings.yaml

# LLM
llm:
  model:           "gpt-4o-mini"
  checker_model:   "gpt-4o-mini"
  max_tokens:      1500
  temperature:     0.1        # low for factual Q&A

# Retrieval
retrieval:
  dense_top_k:    20
  sparse_top_k:   20
  final_top_k:    5
  use_reranker:   false
  reranker_model: "cross-encoder/ms-marco-MiniLM-L-6-v2"

# Chunking
chunking:
  overlap_fraction: 0.10
  section_chunk_chars:
    business:             2400
    risk_factors:         1600
    mda:                  2000
    financial_statements: 1200

# Vector store
vectorstore:
  persist_dir:      "data/vectorstore"
  collection_name:  "finsight_10k"
  embedding_model:  "text-embedding-3-small"

# Evaluation
evaluation:
  faithfulness_threshold:  0.85
  hallucination_threshold: 0.08

# Ingestion defaults
ingestion:
  default_tickers: [AAPL, MSFT, GOOGL, AMZN, NVDA]
  default_years:   [2022, 2023, 2024]
  raw_data_dir:    "data/raw"
